<!DOCTYPE html>
<html lang="pt-BR" class="antialiased">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <title>Cardápio Digital | Carregando...</title>

  <meta name="description" content="Faça seu pedido online no nosso cardápio digital. Rápido, fácil e sem aplicativo.">
  <meta name="theme-color" content="#ffffff">

  <!-- Pré-carregamento da fonte principal para evitar CLS (Cumulative Layout Shift) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Ordem exata de importação do CSS (Design System Vanilla) -->
  <!-- 1. Base -->
  <link rel="stylesheet" href="../assets/css/base/reset.css">
  <link rel="stylesheet" href="../assets/css/base/variables.css">
  <link rel="stylesheet" href="../assets/css/base/typography.css">
  <link rel="stylesheet" href="../assets/css/themes/default.css">

  <!-- 2. Layout -->
  <link rel="stylesheet" href="../assets/css/layout/grid.css">
  <link rel="stylesheet" href="../assets/css/layout/container.css">
  <link rel="stylesheet" href="../assets/css/layout/header.css">

  <!-- 3. Componentes -->
  <link rel="stylesheet" href="../assets/css/components/button.css">
  <link rel="stylesheet" href="../assets/css/components/badge.css">
  <link rel="stylesheet" href="../assets/css/components/card.css">
  <link rel="stylesheet" href="../assets/css/components/input.css">
  <link rel="stylesheet" href="../assets/css/components/search-bar.css">
  <link rel="stylesheet" href="../assets/css/components/skeleton.css">
  <link rel="stylesheet" href="../assets/css/components/modal.css">
  <link rel="stylesheet" href="../assets/css/components/cart.css">

  <!-- 4. Páginas -->
  <link rel="stylesheet" href="../assets/css/pages/cardapio.css">
  <link rel="stylesheet" href="../assets/css/pages/checkout.css">

  <!-- Favicon placeholder (Evitar 404 no console) -->
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍽️</text></svg>">
</head>

<body class="">

  <!-- 
    App Shell (Skeleton UI)
    Isso é o que o usuário vê nos primeiros ~300ms enquanto o JavaScript 
    baixa o config.json e menu.json. Isso garante um LCP (Largest Contentful Paint)
    extremamente rápido e passa a sensação de um app nativo.
  -->
  <div id="app" class="app-layout page-enter">

    <div class="app-body">
      <div class="app-content">
        <!-- Skeleton Header Card -->
        <div class="skeleton"
          style="width:100%; height:180px; border-radius:var(--radius-2xl); margin-bottom:var(--space-4);"></div>

        <!-- Skeleton Info Banner -->
        <div class="skeleton"
          style="width:100%; height:48px; border-radius:var(--radius-lg); margin-bottom:var(--space-4);"></div>

        <!-- Skeleton Nav -->
        <div class="flex gap-2 overflow-hidden mb-6" aria-hidden="true">
          <div class="skeleton" style="width:100px; height:36px; border-radius:var(--radius-full);"></div>
          <div class="skeleton" style="width:120px; height:36px; border-radius:var(--radius-full);"></div>
          <div class="skeleton" style="width:90px; height:36px; border-radius:var(--radius-full);"></div>
          <div class="skeleton" style="width:110px; height:36px; border-radius:var(--radius-full);"></div>
        </div>

        <!-- Skeleton Bestsellers -->
        <div class="section-header--skeleton mb-4" aria-hidden="true">
          <div class="skeleton skeleton--section-title"></div>
        </div>
        <div class="bestsellers-section__grid" aria-hidden="true">
          <div class="product-card product-card--skeleton">
            <div class="skeleton skeleton--image"></div>
            <div class="skeleton-body">
              <div class="skeleton skeleton--title"></div>
              <div class="skeleton skeleton--text"></div>
              <div class="skeleton skeleton--price mt-auto"></div>
            </div>
          </div>
          <div class="product-card product-card--skeleton hidden md:flex">
            <div class="skeleton skeleton--image"></div>
            <div class="skeleton-body">
              <div class="skeleton skeleton--title"></div>
              <div class="skeleton skeleton--text"></div>
              <div class="skeleton skeleton--price mt-auto"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- Skeleton Sidebar Desktop -->
      <div class="app-cart-column" aria-hidden="true">
        <aside class="cart-column">
          <div class="flex items-center justify-between p-4 border-b">
            <div class="skeleton" style="width:120px; height:24px;"></div>
          </div>
          <div class="p-4 flex flex-col gap-4">
            <div class="skeleton" style="width:100%; height:60px;"></div>
            <div class="skeleton" style="width:100%; height:60px;"></div>
          </div>
        </aside>
      </div>
    </div>

  </div> <!-- /#app -->

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@0.511.0/dist/umd/lucide.min.js"></script>

  <!-- App Entry Point (type="module" é obrigatório para suportar import/export nativo do ES6) -->
  <script type="module" src="js/main.js"></script>

</body>

</html>
